name: QA Framework CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  lint-and-compile:
    name: 🔍 Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

  web-tests:
    name: 🌐 Web Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: lint-and-compile
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Web Tests
        run: npx playwright test tests/web --project=${{ matrix.browser }}
        env:
          ENV: qa
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-results-${{ matrix.browser }}
          path: |
            reports/allure/
            test-results/
          retention-days: 7

  api-tests:
    name: 🔌 API Tests
    runs-on: ubuntu-latest
    needs: lint-and-compile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run API Tests
        run: npx playwright test tests/api --project=api
        env:
          ENV: qa
          CI: true

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: |
            reports/allure/
            test-results/
          retention-days: 7

  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [web-tests, api-tests]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Pipeline Summary
        run: |
          echo "## 🧪 QA Framework Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint & TypeScript | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web - Chromium | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web - Firefox | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web - WebKit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 API Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY